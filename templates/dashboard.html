<!doctype html>
<html>
<head>
  <title>Equinox Dashboard - {{username}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 20px;
      background: #121212;
      color: #E0E0E0;
    }
    header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }
    header img {
      width: 60px;
      height: 60px;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
      color: #40E0D0;
    }
    header p {
      margin: 0;
      font-size: 14px;
      color: #A0A0A0;
    }
    h2 {
      color: #40E0D0;
      margin-bottom: 10px;
    }
    #alerts {
      margin-top: 20px;
      padding: 12px;
      background: rgba(64, 224, 208, 0.1);
      border: 1px solid #40E0D0;
      border-radius: 8px;
      color: #40E0D0;
      display: none;
    }
    .alert-item {
      margin-bottom: 8px;
    }
    canvas {
      background: #1E1E1E;
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <header>
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Equinox Logo">
    <div>
      <h1>Equinox</h1>
      <p>Balancing minds, one insight at a time.</p>
    </div>
  </header>

  <h2>Mood Trend for {{username}}</h2>
  <canvas id="moodChart" width="800" height="300"></canvas>

  <div id="alerts">
    <h3>⚠️ Alerts</h3>
    <div id="alerts-list"></div>
  </div>

  <script>
    // Step 1: Fetch posts first
    fetch(`/api/fetch/{{username}}`)
      .then(r => r.json())
      .then(fetchData => {
        if (fetchData.fetched > 0) {
          // Step 2: Fetch mood trend
          return fetch(`/api/mood_trend/{{username}}?days=60`);
        } else {
          throw new Error("No posts fetched for this user.");
        }
      })
      .then(r => r.json())
      .then(data => {
        const trend = data.trend || [];
        if (trend.length === 0) {
          alert("No recent posts to plot!");
          return;
        }

        const labels = trend.map(d => d.date);
        const values = trend.map(d => d.avg_compound);

        new Chart(document.getElementById("moodChart").getContext('2d'), {
          type: "line",
          data: {
            labels: labels,
            datasets: [{
              label: "Sentiment (compound score)",
              data: values,
              fill: true,
              borderColor: "#40E0D0",
              backgroundColor: "rgba(64,224,208,0.15)",
              tension: 0.25,
              pointRadius: 4,
              pointBackgroundColor: "#40E0D0"
            }]
          },
          options: {
            scales: { 
              y: { min: -1, max: 1, ticks: { color: "#E0E0E0" } },
              x: { ticks: { color: "#E0E0E0" } }
            },
            plugins: { 
              legend: { labels: { color: "#E0E0E0" } }
            }
          }
        });

        // Show alerts if any
        const alerts = data.alerts || [];
        if (alerts.length > 0) {
          const alertBox = document.getElementById("alerts");
          const list = document.getElementById("alerts-list");
          list.innerHTML = "";
          alerts.forEach(a => {
            const div = document.createElement("div");
            div.className = "alert-item";
            div.textContent = `${a.date}: ${a.message}`;
            list.appendChild(div);
          });
          alertBox.style.display = "block";
        }
      })
      .catch(err => {
        console.error(err);
        alert("Error loading posts or mood trend.");
      });
  </script>
</body>
</html>
